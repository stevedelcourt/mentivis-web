<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mentivis Solutions</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #111111;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    .loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #111111;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      transition: opacity 0.3s ease;
    }

    .loader.hidden {
      opacity: 0;
      pointer-events: none;
    }

    .loader-spinner {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-top-color: #FFFFFF;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loader" id="loader">
    <div class="loader-spinner"></div>
  </div>

  <iframe 
    src="https://mentivis-solutions.vercel.app/" 
    title="Mentivis Solutions"
    allow="fullscreen"
    loading="eager"
    id="content-frame"
  ></iframe>

  <script>
    (function() {
      const loader = document.getElementById('loader');
      const frame = document.getElementById('content-frame');

      frame.addEventListener('load', function() {
        loader.classList.add('hidden');
      });

      // Fallback: hide loader after 5 seconds even if load event doesn't fire
      setTimeout(function() {
        loader.classList.add('hidden');
      }, 5000);
    })();
  </script>
</body>
</html>
